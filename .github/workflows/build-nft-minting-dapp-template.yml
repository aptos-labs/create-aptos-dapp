name: Build NFT Minting Dapp Template Frontend

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency: ci-${{ github.ref }}-${{ github.workflow }}
    defaults:
      run:
        working-directory: ./templates/nft-minting-dapp-template
    steps:
      - uses: actions/checkout@v4

      # Install pnpm
      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      # Install deps and build.
      - run: pnpm install
      - run: CI= pnpm build

      # Verify that the format is correct
      - run: pnpm exec biome format .
        shell: bash
